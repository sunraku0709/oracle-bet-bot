<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FFD700" />
  <title>Oracle Bet — Hors ligne</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      gap: 20px;
    }
    .icon {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 2px solid #FFD700;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 8px;
    }
    h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: 1px; }
    p  { color: #9ca3af; font-size: 0.95rem; line-height: 1.6; max-width: 320px; }
    .badge {
      display: inline-block;
      background: #FFD70020;
      border: 1px solid #FFD700;
      color: #FFD700;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 4px 12px;
      border-radius: 6px;
      text-transform: uppercase;
    }
    button {
      margin-top: 8px;
      background: #FFD700;
      color: #0a0a0a;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.5px;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="icon">⚡</div>
  <span class="badge">Hors ligne</span>
  <h1>Oracle Bet</h1>
  <p>
    Vous êtes actuellement sans connexion internet.<br />
    Reconnectez-vous pour accéder aux analyses IA.
  </p>
  <button onclick="window.location.reload()">Réessayer</button>
</body>
</html>
